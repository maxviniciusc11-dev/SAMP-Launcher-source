name: Build SAMP APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Encontrar e Preparar Gradle
        run: |
          GRADLE_PATH=$(find . -name "gradlew" | head -n 1)
          if [ -z "$GRADLE_PATH" ]; then
            echo "ERRO: Arquivo gradlew não encontrado no repositório!"
            exit 1
          fi
          chmod +x "$GRADLE_PATH"
          echo "GRADLE_EXEC=$GRADLE_PATH" >> $GITHUB_ENV

      - name: Executar Build
        run: |
          $GRADLE_EXEC assembleDebug --stacktrace

      - name: Localizar APKs Gerados
        run: |
          mkdir -p final_apk
          find . -name "*.apk" -exec cp {} ./final_apk/ \;
          ls -l ./final_apk/

      - name: Upload do APK
        uses: actions/upload-artifact@v4
        with:
          name: SAMP-Launcher-Result
          path: ./final_apk/
          if-no-files-found: error
