name: Build SAMP APK

on:
  push:
    branches: [ "main", "master" ] # Funciona em qualquer uma das duas
  workflow_dispatch: # Libera o botão "Run workflow" na aba Actions

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: # Garante permissão para gravar os arquivos
      contents: write

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle' # Acelera os próximos builds

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Build com Gradle
        run: ./gradlew assembleDebug --stacktrace # Debug é mais rápido para testar se funciona

      - name: Upload APK Gerado
        uses: actions/upload-artifact@v4
        with:
          name: SAMP-APK-Teste
          path: "**/build/outputs/apk/debug/*.apk" # Busca o APK em qualquer subpasta
